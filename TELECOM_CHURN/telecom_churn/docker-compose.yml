# docker-compose.yml
# -------------------
# Runs both API and UI together with one command:
#   docker compose up
#
# Services:
#   api → FastAPI on port 8000
#   ui  → Streamlit on port 8501

version: "3.9"

services:

  # ── FastAPI Prediction Service ──────────────────────────────────────────
  api:
    build: .
    container_name: churn-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models     # persist trained model
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Streamlit UI ────────────────────────────────────────────────────────
  ui:
    image: python:3.11-slim
    container_name: churn-ui
    working_dir: /app
    command: >
      bash -c "pip install streamlit requests --quiet &&
               streamlit run ui/app.py --server.port=8501 --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - ./ui:/app/ui
    environment:
      - API_URL=http://api:8000/predict
    depends_on:
      - api
    restart: unless-stopped